# Forgejo Actions CI/CD
name: Deploy ForgeChat

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 --decode --ignore-garbage > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to VPS
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'set -e; cd /opt/forgechat; git pull origin main; cd client && npm ci && npm run build && cd ..; docker compose up -d --build --remove-orphans; docker compose ps'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/deploy_key
