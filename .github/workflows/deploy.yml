name: Deploy ForgeChat
# ci-test-v3

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 --decode --ignore-garbage > /tmp/dk
          chmod 600 /tmp/dk

      - name: Deploy to VPS via SSH
        run: |
          ssh -i /tmp/dk -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd /opt/forgechat
            git fetch origin
            git reset --hard origin/main
            cd client && npm ci && npm run build && cd ..
            docker compose up -d --build --remove-orphans
            echo "Deployed $(date)"
          '

      - name: Cleanup
        if: always()
        run: rm -f /tmp/dk
