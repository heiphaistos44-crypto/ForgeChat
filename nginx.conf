events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    upstream forgechat_api {
        server server:8080;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name forgechat.heiphaistos.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS principal
    server {
        listen 443 ssl http2;
        server_name forgechat.heiphaistos.org;

        ssl_certificate /etc/letsencrypt/live/forgechat.heiphaistos.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/forgechat.heiphaistos.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' wss://forgechat.heiphaistos.org; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        client_max_body_size 55M;

        # Frontend React (fichiers statiques)
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Assets JS/CSS avec cache long
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API REST
        location /api/ {
            proxy_pass http://forgechat_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket — timeout long pour les connexions persistantes
        location /ws {
            proxy_pass http://forgechat_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Invitations (route publique)
        location /invites/ {
            proxy_pass http://forgechat_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Uploads — ^~ pour priorité sur la regex des assets statiques
        location ^~ /uploads/ {
            proxy_pass http://forgechat_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            # Empêcher l'exécution de SVG/HTML uploadés
            add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self';" always;
        }
    }
}
